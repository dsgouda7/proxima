# ── Shard 2 — Asia / Pacific ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-node-2
  namespace: proxima
  labels: { app: geo-node, shard: "2", region: asia-pacific }
spec:
  replicas: 1
  selector:
    matchLabels: { app: geo-node, shard: "2" }
  template:
    metadata:
      labels: { app: geo-node, shard: "2", region: asia-pacific }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "2Gi",   cpu: "500m" }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
        - name: geo-node
          image: proxima-geo-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
              name: http
          env:
            - { name: NODE_ID,      value: "node-2" }
            - { name: NODE_ADDR,    value: "geo-node-2:4002" }
            - { name: HTTP_PORT,    value: "4002" }
            # Mode A — Sidecar (default)
            - { name: REDIS_URL,    value: "redis://localhost:6379" }
            # Mode B — Managed Redis (uncomment + remove sidecar container above)
            # - name: REDIS_URL
            #   valueFrom: { secretKeyRef: { name: proxima-redis-shard-2, key: REDIS_URL } }
            # - name: API_KEY
            #   valueFrom: { secretKeyRef: { name: proxima-redis-shard-2, key: API_KEY } }
            - { name: PREFIX_START, valueFrom: { configMapKeyRef: { name: proxima-ring, key: GEO_NODE_2_PREFIX_START } } }
            - { name: PREFIX_END,   valueFrom: { configMapKeyRef: { name: proxima-ring, key: GEO_NODE_2_PREFIX_END   } } }
            - { name: SEED_PEERS,   value: "geo-node-0:4000,geo-node-1:4001" }
            - { name: S2_LEVEL,     valueFrom: { configMapKeyRef: { name: proxima-ring, key: S2_LEVEL } } }
            - { name: SPLIT_THRESHOLD_KEYS,      valueFrom: { configMapKeyRef: { name: proxima-ring, key: SPLIT_THRESHOLD_KEYS, optional: "true" } } }
            - { name: MERGE_THRESHOLD_KEYS,      valueFrom: { configMapKeyRef: { name: proxima-ring, key: MERGE_THRESHOLD_KEYS, optional: "true" } } }
            - { name: RUST_LOG,     value: "info" }
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /health, port: 4002 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: geo-node-2
  namespace: proxima
spec:
  selector: { app: geo-node, shard: "2" }
  ports:
    - port: 4002
      name: http
