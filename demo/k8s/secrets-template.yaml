# geo-redis — Managed Redis credentials template
#
# One Secret per shard, one REDIS_URL per Secret.
# The full connection string (host + port + auth token) lives here —
# geo-node reads it from the REDIS_URL env var at startup.
#
# NEVER commit this file with real values.
# Add secrets.yaml to .gitignore and create it per environment.
#
# ── Quick create (imperative) ─────────────────────────────────────────────
#
# Azure Cache for Redis:
#   KEY=$(az redis list-keys --name <instance> --resource-group <rg> \
#           --query primaryKey -o tsv)
#   kubectl create secret generic geo-redis-shard-0 \
#     --namespace=geo-redis \
#     --from-literal=REDIS_URL="rediss://:${KEY}@<instance>.redis.cache.windows.net:6380"
#
# AWS ElastiCache (with AUTH token):
#   kubectl create secret generic geo-redis-shard-0 \
#     --namespace=geo-redis \
#     --from-literal=REDIS_URL="rediss://:<auth-token>@<cluster>.cache.amazonaws.com:6380"
#
# Redis Cloud:
#   kubectl create secret generic geo-redis-shard-0 \
#     --namespace=geo-redis \
#     --from-literal=REDIS_URL="rediss://default:<password>@<host>:<port>"
#
# Sidecar (no external Redis — loopback, no credentials needed):
#   kubectl create secret generic geo-redis-shard-0 \
#     --namespace=geo-redis \
#     --from-literal=REDIS_URL="redis://localhost:6379"
#
# ── GitOps YAML template (fill in and apply) ──────────────────────────────
#
# Repeat the block below for shard-1 (europe) and shard-2 (asia),
# setting geo-redis-shard-1 / geo-redis-shard-2 accordingly.

apiVersion: v1
kind: Secret
metadata:
  name: geo-redis-redis-shard-0
  namespace: geo-redis
  annotations:
    # Which managed Redis service backs this shard (for audit trail)
    geo-redis.io/region: americas
    geo-redis.io/provider: azure-cache   # azure-cache | elasticache | redis-cloud | sidecar
type: Opaque
stringData:
  # Full Redis connection URL including auth token.
  # Use rediss:// (TLS) for any external managed service.
  # Use redis:// only for the loopback sidecar.
  REDIS_URL: "rediss://:<REPLACE_WITH_ACCESS_KEY>@<REPLACE_WITH_HOSTNAME>:6380"

  # Optional: write-endpoint protection key.
  # If set, all POST /ingest, POST /split, PUT /assign-range requests
  # must include the header: X-API-Key: <value>
  # Leave empty to disable auth (dev / internal cluster).
  API_KEY: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: geo-redis-redis-shard-1
  namespace: geo-redis
  annotations:
    geo-redis.io/region: europe
    geo-redis.io/provider: azure-cache
type: Opaque
stringData:
  REDIS_URL: "rediss://:<REPLACE_WITH_ACCESS_KEY>@<REPLACE_WITH_HOSTNAME>:6380"
  API_KEY: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: geo-redis-redis-shard-2
  namespace: geo-redis
  annotations:
    geo-redis.io/region: asia
    geo-redis.io/provider: azure-cache
type: Opaque
stringData:
  REDIS_URL: "rediss://:<REPLACE_WITH_ACCESS_KEY>@<REPLACE_WITH_HOSTNAME>:6380"
  API_KEY: ""
