# ── Shard 1 — Europe / Africa / Middle East ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-node-1
  namespace: geo-redisis
  labels: { app: geo-node, shard: "1", region: europe }
spec:
  replicas: 1
  selector:
    matchLabels: { app: geo-node, shard: "1" }
  template:
    metadata:
      labels: { app: geo-node, shard: "1", region: europe }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "2Gi",   cpu: "500m" }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: shard-data
              mountPath: /data
        - name: geo-node
          image: geo-redis-geo-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              name: http
            - containerPort: 4011
              name: grpc
          env:
            - { name: NODE_ID,      value: "node-1" }
            - { name: NODE_ADDR,    value: "geo-node-1:4001" }
            - { name: HTTP_PORT,    value: "4001" }
            # Mode A — Sidecar (default)
            - { name: REDIS_URL,    value: "redis://localhost:6379" }
            # Mode B — Managed Redis (uncomment + remove sidecar container above)
            # - name: REDIS_URL
            #   valueFrom: { secretKeyRef: { name: geo-redisis-redis-shard-1, key: REDIS_URL } }
            # - name: API_KEY
            #   valueFrom: { secretKeyRef: { name: geo-redisis-redis-shard-1, key: API_KEY } }
            - { name: PREFIX_START, valueFrom: { configMapKeyRef: { name: geo-redisis-ring, key: GEO_NODE_1_PREFIX_START } } }
            - { name: PREFIX_END,   valueFrom: { configMapKeyRef: { name: geo-redisis-ring, key: GEO_NODE_1_PREFIX_END   } } }
            - { name: SEED_PEERS,   value: "geo-node-0:4000,geo-node-2:4002" }
            - { name: S2_LEVEL,     valueFrom: { configMapKeyRef: { name: geo-redisis-ring, key: S2_LEVEL } } }
            - { name: METADATA_ETCD_ENDPOINTS, valueFrom: { configMapKeyRef: { name: geo-redisis-ring, key: METADATA_ETCD_ENDPOINTS } } }
            - { name: SNAPSHOT_PATH, value: "/data/snapshot.db" }
            - { name: SPLIT_THRESHOLD_KEYS,      valueFrom: { configMapKeyRef: { name: geo-redisis-ring, key: SPLIT_THRESHOLD_KEYS, optional: "true" } } }
            - { name: MERGE_THRESHOLD_KEYS,      valueFrom: { configMapKeyRef: { name: geo-redisis-ring, key: MERGE_THRESHOLD_KEYS, optional: "true" } } }
            - { name: RUST_LOG,     value: "info" }
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          volumeMounts:
            - name: shard-data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 15
            periodSeconds: 10

      volumes:
        - name: shard-data
          persistentVolumeClaim:
            claimName: geo-node-1-data
---
apiVersion: v1
kind: Service
metadata:
  name: geo-node-1
  namespace: geo-redisis
spec:
  selector: { app: geo-node, shard: "1" }
  ports:
    - port: 4001
      name: http
    - port: 4011
      name: grpc
