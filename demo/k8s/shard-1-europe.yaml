# ── Shard 1 — Europe / Africa / Middle East ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-node-1
  namespace: georedis
  labels: { app: geo-node, shard: "1", region: europe }
spec:
  replicas: 1
  selector:
    matchLabels: { app: geo-node, shard: "1" }
  template:
    metadata:
      labels: { app: geo-node, shard: "1", region: europe }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "2Gi",   cpu: "500m" }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
        - name: geo-node
          image: georedis-geo-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              name: http
          env:
            - { name: NODE_ID,      value: "node-1" }
            - { name: NODE_ADDR,    value: "geo-node-1:4001" }
            - { name: HTTP_PORT,    value: "4001" }
            - { name: REDIS_URL,    value: "redis://localhost:6379" }
            - { name: PREFIX_START, valueFrom: { configMapKeyRef: { name: georedis-ring, key: GEO_NODE_1_PREFIX_START } } }
            - { name: PREFIX_END,   valueFrom: { configMapKeyRef: { name: georedis-ring, key: GEO_NODE_1_PREFIX_END   } } }
            - { name: SEED_PEERS,   value: "geo-node-0:4000,geo-node-2:4002" }
            - { name: S2_LEVEL,     valueFrom: { configMapKeyRef: { name: georedis-ring, key: S2_LEVEL } } }
            - { name: SPLIT_THRESHOLD_KEYS,      valueFrom: { configMapKeyRef: { name: georedis-ring, key: SPLIT_THRESHOLD_KEYS, optional: "true" } } }
            - { name: MERGE_THRESHOLD_KEYS,      valueFrom: { configMapKeyRef: { name: georedis-ring, key: MERGE_THRESHOLD_KEYS, optional: "true" } } }
            - { name: RUST_LOG,     value: "info" }
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: geo-node-1
  namespace: georedis
spec:
  selector: { app: geo-node, shard: "1" }
  ports:
    - port: 4001
      name: http
