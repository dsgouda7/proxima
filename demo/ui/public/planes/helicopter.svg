<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Helicopter (top-down) showing main rotor and tail boom -->
  <!-- Main rotor disc -->
  <ellipse cx="42" cy="42" rx="40" ry="40" fill="#7c3aed" opacity="0.15"/>
  <line x1="2" y1="42" x2="82" y2="42" stroke="#7c3aed" stroke-width="2.5" opacity="0.6"/>
  <line x1="42" y1="2" x2="42" y2="82" stroke="#7c3aed" stroke-width="2.5" opacity="0.6"/>
  <line x1="13" y1="13" x2="71" y2="71" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="71" y1="13" x2="13" y2="71" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <!-- Center rotor hub -->
  <circle cx="42" cy="42" r="5" fill="#6d28d9"/>
  <!-- Fuselage (cabin) -->
  <ellipse cx="42" cy="46" rx="10" ry="14" fill="#7c3aed"/>
  <!-- Tail boom -->
  <rect x="50" y="50" width="44" height="4" rx="2" fill="#6d28d9"/>
  <!-- Tail rotor -->
  <ellipse cx="94" cy="52" rx="2" ry="8" fill="#7c3aed" opacity="0.7"/>
  <!-- Skids -->
  <line x1="32" y1="57" x2="52" y2="57" stroke="#4c1d95" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="36" x2="51" y2="36" stroke="#4c1d95" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
