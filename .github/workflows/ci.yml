name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust — build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test  --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --check

  ui:
    name: UI — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
        working-directory: demo/ui
      - run: npm run build
        working-directory: demo/ui
      - run: npm ci
        working-directory: demo/cluster-ui
      - run: npm run build
        working-directory: demo/cluster-ui

  docker:
    name: Docker — geo-node image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build geo-node image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: demo/geo-node/Dockerfile
          push: false
          tags: geo-redis-geo-node:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cluster-integration:
    name: Cluster — Redis split lifecycle
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p geo-redis-cluster-test
